const statusEl = document.getElementById('status');
const btnEl = document.getElementById('btnImport');

firebase.initializeApp(firebaseConfig);
firebase.auth().signInAnonymously().catch(e => {
  statusEl.className = 'status err';
  statusEl.textContent = 'Erro ao autenticar: ' + e.message;
});

firebase.auth().onAuthStateChanged(user => {
  if(user){
    statusEl.className = 'status ok';
    statusEl.textContent = 'Conectado. ' + DADOS.length + ' registros prontos.';
    btnEl.disabled = false;
  }
});

btnEl.onclick = function(){
  btnEl.disabled = true;
  statusEl.className = 'status wait';
  statusEl.textContent = 'Restaurando na nuvem…';
  const uid = firebase.auth().currentUser ? firebase.auth().currentUser.uid : 'admin_recovery';
  const ts = Date.now();
  firebase.database().ref('sync/' + fbSafeKey('raguife_v3')).set({
    data: JSON.stringify(DADOS),
    _ts: ts,
    _by: uid
  }).then(() => {
    statusEl.className = 'status ok';
    statusEl.textContent = '✅ Restaurado! ' + DADOS.length + ' registros na nuvem. Uid desta gravação: ' + uid;
  }).catch(e => {
    statusEl.className = 'status err';
    statusEl.textContent = 'Erro: ' + e.message;
    btnEl.disabled = false;
  });
};
